# Lighthouse CI — automatisierte Performance-Messung gegen Production.
#
# Trigger:
#   - workflow_dispatch: manueller Start aus der GitHub Actions UI
#   - schedule: jeden Montag 07:00 UTC (nach Netlify-Deploy der Woche)
#
# Kein hartes Pass/Fail-Gate — Scores werden als Job-Summary + Artifact
# ausgegeben, damit Trends sichtbar sind ohne den Merge-Prozess zu blockieren.
#
# Alternativer Ansatz (Netlify-Plugin):
#   Wenn du lieber Scores direkt im Netlify-Build-Log sehen willst:
#   1. npm install --save-dev @netlify/plugin-lighthouse
#   2. In netlify.toml ergänzen:
#        [[plugins]]
#          package = "@netlify/plugin-lighthouse"
#   Das Plugin läuft automatisch nach jedem Deploy gegen die Deploy-Preview-URL.
#   Vorteil: kein Timing-Problem. Nachteil: ein weiteres npm-Package.

name: Lighthouse CI

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://reparo-app.netlify.app
            https://reparo-app.netlify.app/login
          uploadArtifacts: true
          temporaryPublicStorage: true
