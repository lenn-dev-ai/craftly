<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craftly — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: rgba(0, 212, 170, 0.1);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; color: #00D4AA; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #9ca3af; font-size: 0.875rem; line-height: 1.5; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: linear-gradient(to right, #00D4AA, #00B4D8);
      color: #000;
      border: none;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 9v4m0 4h.01" />
      </svg>
    </div>
    <h1>Du bist offline</h1>
    <p>Keine Internetverbindung. Bitte prüfe deine Verbindung und versuche es erneut.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
